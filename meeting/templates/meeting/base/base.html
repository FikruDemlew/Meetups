
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}All Meetups{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'meeting/styles/base.css' %}">
    {% block site_css %}{% endblock %}
</head>
<body>
    <header id="main-header">
        <nav>
          <a href="/meetings" id="main-logo">All Meetups</a>
        </nav>
        <h1>{% block main_heading %}{% endblock %}</h1>
        {% block header_content %}{% endblock %}
        <p> FIND THE MEETUPS YOU LOVE</p >
    </header>
    <main>
        {% block body %}{% endblock %}
    </main>
</body>
</html>
